services:
  - type: web
    name: predigol
    runtime: static
    rootDir: predigol-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; base-uri 'self'; connect-src 'self' https://aadkcyoyjxglrbiwfdgw.supabase.co wss://aadkcyoyjxglrbiwfdgw.supabase.co; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: https://aadkcyoyjxglrbiwfdgw.supabase.co https://media.api-sports.io; manifest-src 'self'; object-src 'none'; script-src 'self'; style-src 'self'; worker-src 'self'
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Strict-Transport-Security
        value: max-age=315360000; includeSubDomains; preload
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
